<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Календарь — Relax Borovoe CRM</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- ✅ Topbar -->
  <div class="topbar topbar--glass">
    <div class="container nav">
      <a class="brandLink" href="/index.html">
        <div class="logoWrap">
          <img class="logoImg" src="/logo.png" alt="Relax Borovoe"
               onerror="this.style.display='none'; this.parentElement.classList.add('logoFallback')" />
          <div class="logoFallbackBadge">RB</div>
        </div>
        <div>
          <b class="brandTitle">Relax Borovoe</b>
          <div class="small brandSub">CRM • брони • календарь • финансы</div>
        </div>
      </a>

      <nav class="navActions">
        <a class="navItem" href="/bookings.html">Брони</a>
        <a class="navItem" href="/calendar.html">Календарь</a>
        <a class="navItem" href="/finance.html">Финансы</a>
        <a class="navItem" href="/guests.html">Гости</a>
        <a class="navItem" href="/analytics.html">Аналитика</a>
        <button id="logoutBtn" class="navLogout">Выйти🔒</button>
      </nav>
    </div>
  </div>

  <div class="container">
    <div class="card calWrap">

      <div class="calHeader">
        <div>
          <h2 style="margin:0;">Календарь</h2>
          <div class="small">
            Клик по дню откроет список броней. Наведи — быстрый подсказчик.
          </div>
        </div>

        <!-- ✅ ВАЖНО: обертка для ровного выравнивания -->
        <div class="calControls">
          <div class="calControls__nav">
            <button id="prevMonth" class="secondary" type="button">← Пред. месяц</button>
            <button id="todayBtn" class="secondary" type="button">Сегодня</button>
            <button id="nextMonth" class="secondary" type="button">След. месяц →</button>
          </div>

          <div class="calControls__pickers">
            <select id="monthSel"></select>
            <select id="yearSel"></select>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="calFilters">
        <button class="calFilterBtn calFilterBtn--active" data-calfilter="all">Все</button>
        <button class="calFilterBtn" data-calfilter="active">Активные</button>
        <button class="calFilterBtn" data-calfilter="request">Запросы</button>
        <button class="calFilterBtn" data-calfilter="cancelled">Отменённые</button>
      </div>

      <!-- Legend -->
      <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:8px;align-items:center;">
        <span><span style="display:inline-block;width:28px;height:10px;border-radius:6px;background:rgba(34,197,94,.28);margin-right:4px;vertical-align:middle;"></span>Подтверждено</span>
        <span><span style="display:inline-block;width:28px;height:10px;border-radius:6px;background:rgba(245,158,11,.28);margin-right:4px;vertical-align:middle;"></span>Запрос</span>
        <span><span style="display:inline-block;width:28px;height:10px;border-radius:6px;background:rgba(100,116,139,.22);margin-right:4px;vertical-align:middle;"></span>Завершено</span>
      </div>

      <div class="calGrid" id="calDow"></div>
      <div class="calWeeks" id="calGrid"></div>

      <div class="hint" id="calHint"></div>
    </div>
  </div>

  <script src="/app.js"></script>

  <!-- Модалка: список броней на день -->
  <div id="bookingModal" class="modal hidden">
    <div class="modal-content" style="max-width:600px;">
      <div class="modal-header">
        <b id="modalTitle">Брони</b>
        <button id="modalClose" type="button" class="secondary" style="width:auto;">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

</body>
</html>
