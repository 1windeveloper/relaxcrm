<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Календарь — Relax Borovoe CRM</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- ✅ Topbar -->
  <div class="topbar topbar--glass">
    <div class="container nav">
      <a class="brandLink" href="/index.html">
        <div class="logoWrap">
          <img class="logoImg" src="/logo.png" alt="Relax Borovoe"
               onerror="this.style.display='none'; this.parentElement.classList.add('logoFallback')" />
          <div class="logoFallbackBadge">RB</div>
        </div>
        <div>
          <b class="brandTitle">Relax Borovoe</b>
          <div class="small brandSub">CRM • брони • календарь • финансы</div>
        </div>
      </a>

      <nav class="navActions">
        <a class="navItem" href="/bookings.html">Брони</a>
        <a class="navItem" href="/calendar.html">Календарь</a>
        <a class="navItem" href="/finance.html">Доходы</a>
        <a class="navItem" href="/expenses.html">Расходы</a>
        <a class="navItem" href="/guests.html">Гости</a>

        <!-- 👇 ВЫХОД -->
        <button id="logoutBtn" class="navLogout">Выйти🔒</button>
      </nav>
    </div>
  </div>

  <div class="container">
    <div class="card calWrap">

      <div class="calHeader">
        <div>
          <h2 style="margin:0;">Календарь</h2>
          <div class="small">
            Клик по дню откроет список броней. Наведи — быстрый подсказчик.
          </div>
        </div>

        <!-- ✅ ВАЖНО: обертка для ровного выравнивания -->
        <div class="calControls">
          <div class="calControls__nav">
            <button id="prevMonth" class="secondary" type="button">← Пред. месяц</button>
            <button id="todayBtn" class="secondary" type="button">Сегодня</button>
            <button id="nextMonth" class="secondary" type="button">След. месяц →</button>
          </div>

          <div class="calControls__pickers">
            <select id="monthSel"></select>
            <select id="yearSel"></select>
          </div>
        </div>
      </div>

      <!-- ✅ Показ запросов -->
      <div class="checkRow" style="margin-top:10px;">
        <input id="calShowRequest" type="checkbox" />
        <label for="calShowRequest">Показывать «Запрос» тоже (иначе только «Подтверждено/Завершено»)</label>
      </div>

      <div class="legend" style="margin-top:8px;">
        <span><i class="dot free"></i> Свободно</span>
        <span><i class="dot busy"></i> Занято</span>
      </div>

      <div class="calGrid" id="calDow"></div>
      <div class="calGrid" id="calGrid"></div>

      <div class="hint" id="calHint"></div>
    </div>
  </div>

  <script src="/app.js"></script>

  <!-- ✅ Модалка: список броней на день -->
  <div id="bookingModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <b id="modalTitle">Брони</b>
        <button id="modalClose" type="button">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <button id="modalOk" class="modal-ok" type="button">Понятно</button>
    </div>
  </div>

</body>
</html>
